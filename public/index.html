<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Rick and Morty — Catalog</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-left">
      <img src="./encabezado.png" alt="encabezado" class="header-logo" />
    </div>
    <div class="header-center">
      <h1 class="site-title">Rick and Morty</h1>
    </div>
    <div class="header-right">
      <button id="game-toggle" class="game-btn">🎮 Jugar</button>
      <div id="bmc-wrapper">
        <script type="text/javascript" src="https://cdnjs.buymeacoffee.com/1.0.0/button.prod.min.js" data-name="bmc-button" data-slug="ab1melek" data-color="#FFDD00" data-emoji="☕"  data-font="Cookie" data-text="Apoyar" data-outline-color="#000000" data-font-color="#000000" data-coffee-color="#ffffff" ></script>
      </div>
    </div>
  </header>

  <main class="main" id="catalog-view">
    <section class="controls">
      <label for="mode">Buscar en</label>
      <select id="mode">
        <option value="all">All</option>
        <option value="name">Nombre</option>
        <option value="species">Especie</option>
      </select>

      <select id="options" style="display:none"></select>

      <button id="search">Buscar</button>
    </section>

    <section id="cards-area" class="cards-area">
      <div id="left-col" class="col"></div>
      <div id="right-col" class="col"></div>
    </section>

    <nav class="pagination">
      <button id="prev">Anterior</button>
      <span id="pageInfo" class="page-info"></span>
      <button id="next">Siguiente</button>
    </nav>
  </main>

  <!-- MINIJUEGO -->
  <div id="game-view" class="game-container" style="display:none;">
    <div class="game-header">
      <div class="game-stats">
        <div class="stat">
          <span class="stat-label">TIEMPO</span>
          <span id="timer" class="stat-value">60</span>
        </div>
        <div class="stat">
          <span class="stat-label">PUNTOS</span>
          <span id="score" class="stat-value">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">RÉCORD</span>
          <span id="highscore" class="stat-value">0</span>
        </div>
      </div>
      <button id="back-catalog" class="back-btn">← Volver</button>
    </div>
    
    <div id="game-area" class="game-area">
      <!-- Aquí aparecerán las imágenes volando -->
    </div>
    
    <div id="game-over" class="game-over" style="display:none;">
      <h2>¡GAME OVER!</h2>
      <p class="final-score">Puntuación: <span id="final-score">0</span></p>
      <p class="high-score-msg" id="high-score-msg"></p>
      <button id="play-again" class="play-btn">Jugar de nuevo</button>
    </div>
  </div>

  <footer class="site-footer">
    <div class="footer-content">
      <p style="margin: 0;">by <a href="https://www.linkedin.com/in/abimelekcastrezana/" target="_blank" rel="noopener">@ab1melek</a></p>
    </div>
  </footer>

  <!-- Audio invisible en bucle automático -->
  <audio loop style="display:none;">
    <source src="./Rick-and-Morty-Theme-Song.mp3" type="audio/mpeg">
  </audio>

  <!-- Inyectar window.API_BASE desde el backend -->
  <script src="/config.js"></script>
  <script src="./app.js"></script>
</body>
</html>
