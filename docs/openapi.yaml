openapi: 3.0.3
info:
  title: Rick and Morty Characters API
  version: 1.0.0
servers:
  - url: http://{hostname}:{port}/api/{version}
    variables:
      hostname:
        default: localhost
      port:
        default: '3000'
      version:
        default: v1
tags:
  - name: Characters
    description: Búsqueda de personajes
  - name: Catalogs
    description: Catálogos de búsqueda

paths:
  /catalogo/nombres:
    get:
      tags:
        - Catalogs
      summary: Nombres disponibles
      responses:
        '200':
          description: Lista de nombres
          content:
            application/json:
              schema:
                type: object
                properties:
                  nombres:
                    type: array
                    items:
                      type: string
                    example: ["Rick", "Morty", "Summer", "Jerry", "Beth"]

  /catalogo/especies:
    get:
      tags:
        - Catalogs
      summary: Especies disponibles
      responses:
        '200':
          description: Lista de especies en español
          content:
            application/json:
              schema:
                type: object
                properties:
                  especies:
                    type: array
                    items:
                      type: string
                    example: ["Humano", "Alienigena", "Humanoide", "Criatura mitológica", "Animal", "Robot", "Cronenberg", "Enfermedad"]

  /characters:
    get:
      tags:
        - Characters
      summary: Buscar personajes
      description: Sin filtros devuelve todos. Con name/species devuelve catálogo filtrado. 10 resultados máx por página.
      parameters:
        - name: name
          in: query
          schema:
            type: string
            enum: ["Rick", "Morty", "Summer", "Jerry", "Beth"]
        - name: species
          in: query
          schema:
            type: string
            enum: ["Humano", "Alienigena", "Humanoide", "Poopybutthole", "Criatura mitológica", "Animal", "Robot", "Cronenberg", "Enfermedad"]
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Personajes encontrados
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Character'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
                required:
                  - data
        '400':
          description: Parámetro inválido
        '404':
          description: Sin resultados
        '500':
          description: Error servidor

components:
  schemas:
    Character:
      type: object
      properties:
        imagen:
          type: string
        nombre:
          type: string
        especie:
          type: string
      required:
        - imagen
        - nombre
        - especie

    Pagination:
      type: object
      properties:
        pages:
          type: integer
          nullable: true
        next:
          type: string
          nullable: true
        prev:
          type: string
          nullable: true
